<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONNX Viewer — __MODEL_NAME__</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 1.2rem 1.6rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 { font-size: 1.4rem; border-bottom: 2px solid #0078d4; padding-bottom: .4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.05rem; color: #0078d4; margin: 1.4rem 0 .5rem; }
    #status { font-size: .9rem; color: #555; margin-bottom: .8rem; min-height: 1.2em; }
    #status.error { color: #c00; font-weight: 600; }

    /* Info table */
    table { border-collapse: collapse; width: 100%; font-size: .9rem; }
    th, td { text-align: left; padding: .3rem .6rem; border: 1px solid #ddd; }
    th { background: #eef4fb; font-weight: 600; }
    td code { background: #f0f0f0; padding: .1rem .3rem; border-radius: 3px; font-size: .85rem; }

    /* Input fieldsets */
    fieldset {
      border: 1px solid #ccc;
      border-radius: 6px;
      margin: .5rem 0;
      padding: .5rem .9rem .7rem;
    }
    legend { font-weight: 600; padding: 0 .3rem; font-size: .95rem; }
    legend small { font-weight: 400; color: #666; font-size: .8rem; margin-left: .4rem; }
    .input-row { display: inline-flex; align-items: center; gap: .3rem; margin: .25rem .5rem .25rem 0; }
    .input-row span { color: #666; font-size: .8rem; min-width: 2.5rem; text-align: right; }
    input[type="number"], input[type="text"] {
      width: 9rem;
      padding: .25rem .4rem;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: .9rem;
    }
    input[type="number"]:focus, input[type="text"]:focus {
      outline: 2px solid #0078d4;
      border-color: transparent;
    }
    input[type="checkbox"] { width: 1.1rem; height: 1.1rem; cursor: pointer; }

    /* Run button */
    #run-btn {
      display: block;
      margin-top: 1.2rem;
      padding: .55rem 1.6rem;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
    }
    #run-btn:hover:not(:disabled) { background: #005fa3; }
    #run-btn:disabled { background: #aaa; cursor: not-allowed; }

    /* Output */
    #output-display {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: .9rem 1.1rem;
      font-size: .88rem;
      min-height: 3rem;
      margin-top: .5rem;
    }
    #output-display.error { color: #c00; white-space: pre-wrap; }
    .out-block { margin-bottom: 1rem; }
    .out-block:last-child { margin-bottom: 0; }
    .out-name { font-weight: 600; font-family: monospace; margin-bottom: .35rem; }
    .out-name small { font-weight: 400; color: #666; font-size: .8rem; margin-left: .4rem; }
    .out-scalar { font-family: monospace; font-size: 1rem; color: #0078d4; font-weight: 600; }
    .out-values { font-family: monospace; word-break: break-all; }
    .prob-table { border-collapse: collapse; font-size: .88rem; margin-top: .25rem; }
    .prob-table th, .prob-table td { padding: .2rem .7rem; border: 1px solid #ddd; text-align: right; }
    .prob-table th { background: #eef4fb; text-align: center; }
    .prob-table td:first-child { text-align: center; font-weight: 600; }
    .prob-bar { display: inline-block; height: .7rem; background: #0078d4; border-radius: 2px; vertical-align: middle; margin-left: .4rem; }

    /* Graph visualisation */
    #section-graph details { margin: 0; }
    summary.graph-summary {
      display: block;
      font-size: 1.05rem;
      color: #0078d4;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      margin: 1.4rem 0 .5rem;
      outline: none;
    }
    summary.graph-summary::-webkit-details-marker,
    summary.graph-summary::marker { display: none; }
    summary.graph-summary::before {
      content: '\25B6\00A0';
      font-size: .75rem;
      display: inline-block;
      transition: transform .15s;
    }
    details[open] > summary.graph-summary::before { transform: rotate(90deg); }
    #graph-container { overflow: auto; max-height: 480px; }
    #svg-tip { position:fixed; background:#1e1e1e; color:#eee; font:12px/1.6 monospace,monospace; padding:.4rem .65rem; border-radius:5px; box-shadow:0 2px 10px rgba(0,0,0,.4); white-space:pre; pointer-events:none; z-index:9999; max-width:440px; display:none; }
    #svg-tip { position:fixed; background:#1e1e1e; color:#eee; font:12px/1.5 monospace,monospace; padding:.4rem .6rem; border-radius:5px; box-shadow:0 2px 8px rgba(0,0,0,.35); white-space:pre; pointer-events:none; z-index:9999; max-width:420px; display:none; }
  </style>
</head>
<body>

<h1>ONNX Model Viewer &mdash; <span id="model-name">__MODEL_NAME__</span></h1>
<div id="status">Initialising…</div>

<section id="section-info" hidden>
  <h2>Model I/O</h2>
  <table>
    <thead>
      <tr><th>Role</th><th>Name</th><th>ONNX Type</th><th>Shape</th></tr>
    </thead>
    <tbody id="info-body"></tbody>
  </table>
</section>

<section id="section-graph" hidden>
  <details id="graph-details">
    <summary class="graph-summary">Graph Visualization</summary>
    <div id="svg-tip"></div>
    <div id="svg-tip"></div>
    <div id="graph-container" style="border:1px solid #ddd;border-radius:6px;background:#fff;margin-top:.4rem;min-height:2.5rem">
      <p style="padding:.7rem 1rem;color:#888;font-size:.88rem;margin:0">Click to render…</p>
    </div>
  </details>
</section>

<section id="section-inputs" hidden>
  <h2>Inputs</h2>
  <form id="inference-form" novalidate></form>
  <button id="run-btn" disabled>&#9654; Run Inference</button>
</section>

<section id="section-outputs" hidden>
  <h2>Outputs</h2>
  <div id="output-display"></div>
</section>

<script>
// ─── Template variables (replaced by html_generator.py at log time) ───────────
const MODEL_FILENAME    = "__MODEL_FILENAME__";
const MODEL_ARTIFACT_DIR = "__MODEL_ARTIFACT_DIR__";
const MODEL_NAME        = "__MODEL_NAME__";
const RUN_ID            = "__RUN_ID__";           // embedded at log time
const MODEL_B64         = "__MODEL_B64__";        // base64-encoded .onnx bytes
const INPUTS_META       = __INPUTS_META_JSON__;   // [{name, type, shape}]
const OUTPUTS_META      = __OUTPUTS_META_JSON__;  // [{name, type, shape}]
const GRAPH_NODES       = __GRAPH_NODES_JSON__;   // [{opType, name, inputs, outputs}]
const GRAPH_GROUPS      = __GRAPH_GROUPS_JSON__;  // {label: [nodeName|opType, ...]}
const GRAPH_OUTPUT_GROUPS = __GRAPH_OUTPUT_GROUPS_JSON__; // {label: [outputName, ...]}
const SCORED_MODEL_B64  = "__SCORED_MODEL_B64__"; // model with all intermediate outputs exposed
const INITIAL_TENSOR_VALUES = __INITIAL_TENSOR_VALUES_JSON__; // pre-computed with zero input

// ─── ORT type map (ONNX DataType name → ort.Tensor type string) ───────────────
const ORT_TYPE = {
  FLOAT: 'float32', DOUBLE: 'float64',
  INT8: 'int8',   INT16: 'int16',   INT32: 'int32',   INT64: 'int64',
  UINT8: 'uint8', UINT16: 'uint16', UINT32: 'uint32', UINT64: 'uint64',
  BOOL: 'bool',   STRING: 'string',
};

const TYPED_ARR = {
  float32: Float32Array, float64: Float64Array,
  int8: Int8Array,   int16: Int16Array,   int32: Int32Array,
  uint8: Uint8Array, uint16: Uint16Array, uint32: Uint32Array,
};

const isBool   = t => t === 'BOOL';
const isStr    = t => t === 'STRING';
const isInt64  = t => t === 'INT64' || t === 'UINT64';
const isFloat  = t => t === 'FLOAT' || t === 'DOUBLE';
const isIntish = t => !isFloat(t) && !isBool(t) && !isStr(t);

// ─── Shape helpers ─────────────────────────────────────────────────────────────
// Replace symbolic / unknown dims with 1 for concrete inference
function resolveShape(shape) {
  if (!shape || shape.length === 0) return [1];
  return shape.map(d => (typeof d === 'number' && d > 0) ? d : 1);
}

function numElems(shape) {
  return resolveShape(shape).reduce((a, b) => a * b, 1);
}

function shapeLabel(shape) {
  if (!shape || shape.length === 0) return 'scalar';
  return '[' + shape.map(d => d === null ? '?' : d).join(' \xd7 ') + ']';
}

// ─── MLflow artifact URL construction ─────────────────────────────────────────
// RUN_ID is embedded at log time. Also try URL params as fallback.
function modelUrl() {
  const path  = MODEL_ARTIFACT_DIR + '/' + MODEL_FILENAME;
  const runId = RUN_ID
    || new URLSearchParams(window.location.search).get('run_uuid')
    || new URLSearchParams(window.location.search).get('run_id');
  if (runId) {
    return (
      window.location.origin +
      '/get-artifact?path=' + encodeURIComponent(path) +
      '&run_uuid=' + encodeURIComponent(runId)
    );
  }
  // Last-resort fallback for direct file-system opening
  return MODEL_FILENAME;
}

// ─── Render model I/O info table ──────────────────────────────────────────────
function renderInfoTable() {
  const rows = [
    ...INPUTS_META.map(m  => ({ role: 'input',  ...m })),
    ...OUTPUTS_META.map(m => ({ role: 'output', ...m })),
  ];
  document.getElementById('info-body').innerHTML = rows.map(r =>
    `<tr>
       <td>${r.role}</td>
       <td><code>${r.name}</code></td>
       <td>${r.type}</td>
       <td>${shapeLabel(r.shape)}</td>
     </tr>`
  ).join('');
  document.getElementById('section-info').hidden = false;
}

// ─── Render input form ─────────────────────────────────────────────────────────
function renderInputForm() {
  const form = document.getElementById('inference-form');
  form.innerHTML = '';

  INPUTS_META.forEach(inp => {
    const n  = numElems(inp.shape);
    const fs = document.createElement('fieldset');
    fs.innerHTML =
      `<legend><code>${inp.name}</code><small>${inp.type} ${shapeLabel(inp.shape)}</small></legend>`;

    for (let i = 0; i < n; i++) {
      const id  = `${inp.name}__${i}`;
      const row = document.createElement('div');
      row.className = 'input-row';

      if (isBool(inp.type)) {
        row.innerHTML = `<span>[${i}]</span><input type="checkbox" id="${id}" name="${id}">`;
      } else if (isStr(inp.type)) {
        row.innerHTML = `<span>[${i}]</span><input type="text" id="${id}" name="${id}" value="">`;
      } else {
        const step = isFloat(inp.type) ? 'any' : '1';
        row.innerHTML =
          `<span>[${i}]</span><input type="number" id="${id}" name="${id}" step="${step}" value="0">`;
      }
      fs.appendChild(row);
    }
    form.appendChild(fs);
  });

  document.getElementById('section-inputs').hidden = false;
  document.getElementById('run-btn').disabled = false;
}

// ─── Collect form values → ORT feed dict ──────────────────────────────────────
function collectFeeds() {
  const form  = document.getElementById('inference-form');
  const feeds = {};

  INPUTS_META.forEach(inp => {
    const n        = numElems(inp.shape);
    const shape    = resolveShape(inp.shape);
    const ortType  = ORT_TYPE[inp.type] || 'float32';
    const elements = Array.from({ length: n }, (_, i) => form.elements[`${inp.name}__${i}`]);

    let tensor;
    if (isStr(inp.type)) {
      tensor = new ort.Tensor('string', elements.map(el => el.value), shape);
    } else if (isBool(inp.type)) {
      const data = new Uint8Array(elements.map(el => el.checked ? 1 : 0));
      tensor = new ort.Tensor('bool', data, shape);
    } else if (isInt64(inp.type)) {
      const data = new BigInt64Array(elements.map(el => BigInt(Math.round(parseFloat(el.value) || 0))));
      tensor = new ort.Tensor(ortType, data, shape);
    } else {
      const Arr  = TYPED_ARR[ortType] || Float32Array;
      const data = new Arr(elements.map(el => parseFloat(el.value) || 0));
      tensor = new ort.Tensor(ortType, data, shape);
    }
    feeds[inp.name] = tensor;
  });

  return feeds;
}

// ─── Display inference results ────────────────────────────────────────────────

// Read an ORT output tensor into a normalised structure.
function readOrtData(tensor) {
  if (!tensor) return { kind: 'unknown', values: null };

  const t = (tensor.type || '').toLowerCase();

  // Placeholder for outputs that couldn't be fetched
  if (t === 'skipped') return { kind: 'skipped', values: null };

  // ORT Web may return a native JS Array for sequence outputs
  if (Array.isArray(tensor)) {
    const items = tensor.map(item =>
      item instanceof Map ? [...item.entries()] :
      typeof item === 'object' ? Object.entries(item).filter(([k]) => !isNaN(Number(k))) :
      [[0, item]]
    );
    return { kind: 'sequence', values: items };
  }

  // ORT Web sequence type — numeric index keys hold each map element
  if (t === 'sequence' || t.startsWith('seq')) {
    const len = (tensor.dims && tensor.dims[0]) ||
                (tensor.value && tensor.value.length) || 1;
    const src  = tensor.value || tensor;
    const items = [];
    for (let i = 0; i < len; i++) {
      const el = src[i] || {};
      items.push(el instanceof Map ? [...el.entries()]
                                   : Object.entries(el).filter(([k]) => !isNaN(Number(k))));
    }
    return { kind: 'sequence', values: items };
  }

  // ORT Web map type
  if (t === 'map') {
    const v = tensor.value || tensor;
    const entries = v instanceof Map
      ? [...v.entries()]
      : Object.entries(v).filter(([k]) => !isNaN(Number(k)));
    return { kind: 'probmap', values: entries };
  }

  // Standard tensor: .data is a TypedArray
  try {
    const d = tensor.data;
    if (d && typeof d.length === 'number') {
      return { kind: 'tensor', values: Array.from(d).map(v => typeof v === 'bigint' ? v.toString() : v) };
    }
  } catch (_) { /* fall through */ }

  return { kind: 'unknown', values: null };
}

function buildProbTable(entries) {
  // entries: [[classLabel, probability], ...] sorted by prob desc
  const tbl = document.createElement('table');
  tbl.className = 'prob-table';
  const hdr = tbl.insertRow();
  ['Class', 'Probability', ''].forEach(h => {
    const th = document.createElement('th'); th.textContent = h; hdr.appendChild(th);
  });
  for (const [cls, prob] of entries) {
    const row = tbl.insertRow();
    row.insertCell().textContent = cls;
    const pct = typeof prob === 'number' ? prob : parseFloat(prob);
    row.insertCell().textContent = isNaN(pct) ? prob : pct.toFixed(4);
    const barCell = row.insertCell();
    if (!isNaN(pct)) {
      const bar = document.createElement('span');
      bar.className = 'prob-bar';
      bar.style.width = (pct * 160).toFixed(1) + 'px';
      barCell.appendChild(bar);
    }
  }
  return tbl;
}

function showResults(results) {
  const container = document.getElementById('output-display');
  container.innerHTML = '';
  container.className = '';

  for (const [name, tensor] of Object.entries(results)) {
    const outMeta = OUTPUTS_META.find(m => m.name === name);
    const block = document.createElement('div');
    block.className = 'out-block';

    const nameDiv = document.createElement('div');
    nameDiv.className = 'out-name';
    nameDiv.innerHTML = `<code>${name}</code><small>${outMeta ? outMeta.type : tensor.type}</small>`;
    block.appendChild(nameDiv);

    const { kind, values } = readOrtData(tensor);

    // Heuristic: a FLOAT output with >1 value and a name hinting at probability
    // is treated as a per-class score table rather than a raw value list.
    const looksLikeProba = kind === 'tensor'
      && values.length > 1
      && values.every(v => !isNaN(parseFloat(v)))
      && /prob|score|softmax/i.test(name);

    if (kind === 'tensor' && !looksLikeProba) {
      if (values.length === 1) {
        // Scalar result — highlight it
        const d = document.createElement('div');
        d.className = 'out-scalar';
        d.textContent = values[0];
        block.appendChild(d);
      } else {
        const d = document.createElement('div');
        d.className = 'out-values';
        d.textContent = values.join(', ');
        block.appendChild(d);
      }
    } else if (looksLikeProba) {
      // Plain FLOAT tensor whose name suggests class probabilities.
      // Build a class→prob table using class index as label.
      const entries = values
        .map((v, i) => [String(i), parseFloat(v)])
        .sort((a, b) => b[1] - a[1]);
      block.appendChild(buildProbTable(entries));
    } else if (kind === 'sequence') {
      // Sequence<Map<K,V>> — each element is a map of class→prob
      values.forEach((mapEntries, i) => {
        const entries = mapEntries
          .map(([k, v]) => [k, typeof v === 'bigint' ? Number(v) : Number(v)])
          .sort((a, b) => b[1] - a[1]);
        if (values.length > 1) {
          const idx = document.createElement('div');
          idx.style.cssText = 'font-size:.8rem;color:#888;margin:.3rem 0 .1rem';
          idx.textContent = `sample ${i}`;
          block.appendChild(idx);
        }
        block.appendChild(buildProbTable(entries));
      });
    } else if (kind === 'probmap') {
      const entries = values
        .map(([k, v]) => [k, typeof v === 'bigint' ? Number(v) : Number(v)])
        .sort((a, b) => b[1] - a[1]);
      block.appendChild(buildProbTable(entries));
    } else if (kind === 'skipped') {
      const d = document.createElement('div');
      d.style.cssText = 'color:#888;font-size:.85rem;font-style:italic';
      d.textContent = '(output type not supported by ORT Web — skipped)';
      block.appendChild(d);
    } else {
      // Fallback: serialise whatever we have
      const d = document.createElement('div');
      d.className = 'out-values';
      try { d.textContent = JSON.stringify(tensor, null, 2); }
      catch (_) { d.textContent = '(cannot display output)'; }
      block.appendChild(d);
    }

    container.appendChild(block);
  }

  document.getElementById('section-outputs').hidden = false;
}

// ─── Initialisation ───────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
const runBtn   = document.getElementById('run-btn');
let   session       = null;
let   scoredSession = null;
let   tensorValues  = Object.assign({}, INITIAL_TENSOR_VALUES);  // pre-filled from Python; updated after browser inference

// Decode base64 bytes without hitting the call-stack limit on large strings.
function b64ToBytes(b64) {
  const binary = atob(b64);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
function modelBytes()       { return b64ToBytes(MODEL_B64); }
function scoredModelBytes() { return b64ToBytes(SCORED_MODEL_B64); }

// Summarise an ORT tensor into a short display string for graph annotation.
function summarizeTensor(tensor) {
  if (!tensor) return null;
  try {
    const d = tensor.data;
    if (!d || typeof d.length !== 'number') return null;
    const vals = Array.from(d).map(v => typeof v === 'bigint' ? Number(v) : v);
    const n = vals.length;
    if (n === 0) return null;
    const shape = tensor.dims && tensor.dims.length ? '[' + tensor.dims.join('\u00d7') + ']' : '';
    const isFloat = tensor.type === 'float32' || tensor.type === 'float64';
    if (n === 1) return shape + ' ' + (isFloat ? Number(vals[0]).toFixed(4) : String(vals[0]));
    if (isFloat) {
      if (n <= 5) return shape + '\u00a0' + vals.map(v => Number(v).toFixed(3)).join(', ');
      const maxIdx = vals.reduce((bi, v, i) => v > vals[bi] ? i : bi, 0);
      return shape + '\u00a0argmax=' + maxIdx + ' (' + Number(vals[maxIdx]).toFixed(3) + ')';
    }
    if (n <= 5) return shape + '\u00a0' + vals.join(', ');
    return shape + '\u00a0' + vals.slice(0, 3).join(', ') + '\u2026';
  } catch (_) { return null; }
}

async function init() {
  statusEl.textContent = 'Loading model…';
  try {
    session = await ort.InferenceSession.create(modelBytes());
    statusEl.textContent = 'Model loaded. Fill in the inputs below and click Run Inference.';
    renderInfoTable();
    renderInputForm();
    document.getElementById('section-graph').hidden = false;
    renderOnnxGraph();  // render immediately — INITIAL_TENSOR_VALUES already available
    // Load scored session (all intermediate outputs exposed) silently in background.
    try {
      scoredSession = await ort.InferenceSession.create(scoredModelBytes());
    } catch (e) {
      console.warn('[scored session] failed to load:', e.message);
      statusEl.textContent += '  (graph annotation unavailable: ' + e.message + ')';
    }
  } catch (err) {
    statusEl.textContent = 'Failed to load model: ' + err.message;
    statusEl.className   = 'error';
  }
}

runBtn.addEventListener('click', async () => {
  runBtn.disabled = true;
  const outDiv = document.getElementById('output-display');
  outDiv.innerHTML = '<span style="color:#888">Running…</span>';
  outDiv.className = '';
  document.getElementById('section-outputs').hidden = false;
  try {
    // The embedded model has ZipMap removed — all outputs are plain tensors.
    // Collect feeds twice: ORT Web may dispose tensor data after the first session.run().
    const feeds       = collectFeeds();
    const feedsScored = collectFeeds();
    // Clear old values and capture inputs for graph annotation.
    tensorValues = {};
    for (const [name, t] of Object.entries(feeds)) {
      const s = summarizeTensor(t);
      if (s) tensorValues[name] = s;
    }
    const results = await session.run(feeds);
    showResults(results);
    // Run scored session to capture intermediate tensor values for graph annotation.
    if (scoredSession) {
      try {
        const scoredResults = await scoredSession.run(feedsScored);
        for (const [name, t] of Object.entries(scoredResults)) {
          const s = summarizeTensor(t);
          if (s) tensorValues[name] = s;
        }
      } catch (e) {
        console.warn('[scored session] inference error:', e.message);
      }
    }
    // Always re-render graph with updated values.
    renderOnnxGraph();
  } catch (err) {
    outDiv.textContent = 'Error: ' + err.message;
    outDiv.className   = 'error';
  } finally {
    runBtn.disabled = false;
  }
});

// ─── ONNX Graph Visualisation ────────────────────────────────────────────────────────────────────────────

function xmlEsc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Track which groups are currently expanded (their label strings).
const expandedGroups = new Set();
const expandedOutputGroups = new Set();

function renderOnnxGraph() {
  const container = document.getElementById('graph-container');
  try {
    const opNodes = GRAPH_NODES;
    if (!opNodes.length) {
      container.innerHTML = '<p style="padding:.8rem;color:#888;margin:0">No graph nodes found.</p>';
      return;
    }
    if (opNodes.length > 300) {
      container.innerHTML = `<p style="padding:.8rem;color:#888;margin:0">Graph has ${opNodes.length} nodes — too large to render inline.</p>`;
      return;
    }

    // ── Build node→group path map (supports nested dicts) ────────────────────
    // GRAPH_GROUPS: { label: [...] | { label: [...] | {...} } }
    // nodeToPath[i] = ['TopGroup', 'SubGroup', ...] (full path to deepest group)

    // Match a string against a pattern where * is a wildcard for any chars.
    function matchesPattern(str, pattern) {
      if (!str) return false;
      const re = new RegExp('^' + pattern.replace(/[.+^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*') + '$');
      return re.test(str);
    }
    function nodeMatchesMember(n, member) {
      return matchesPattern(n.name, member) || matchesPattern(n.opType, member);
    }

    const nodeToPath = {};
    (function assignPaths(obj, path) {
      for (const [label, val] of Object.entries(obj)) {
        const p = [...path, label];
        if (Array.isArray(val)) {
          opNodes.forEach((n, i) => {
            if (val.some(m => nodeMatchesMember(n, m))) nodeToPath[i] = p;
          });
        } else {
          assignPaths(val, p);
        }
      }
    })(GRAPH_GROUPS, []);

    // For a node at pathArray, return the pathStr of the deepest collapsed ancestor,
    // or null when all ancestors are expanded (node renders as itself).
    function visibleGroupPathStr(pathArray) {
      for (let i = 0; i < pathArray.length; i++) {
        const ps = pathArray.slice(0, i + 1).join('/');
        if (!expandedGroups.has(ps)) return ps;
      }
      return null;
    }

    // Count op-node leaves belonging to (or below) a pathStr prefix.
    function countLeaves(pathStr) {
      return Object.values(nodeToPath).filter(p => p.join('/').startsWith(pathStr)).length;
    }

    // ── Build output→group path map (mirrors op-node grouping for outputs) ───
    const outputToPath = {};
    (function assignOutPaths(obj, path) {
      for (const [label, val] of Object.entries(obj)) {
        const p = [...path, label];
        if (Array.isArray(val)) {
          OUTPUTS_META.forEach((m, i) => {
            if (val.some(pat => matchesPattern(m.name, pat))) outputToPath[i] = p;
          });
        } else {
          assignOutPaths(val, p);
        }
      }
    })(GRAPH_OUTPUT_GROUPS, []);

    function visibleOutputGroupPathStr(pathArray) {
      for (let i = 0; i < pathArray.length; i++) {
        const ps = pathArray.slice(0, i + 1).join('/');
        if (!expandedOutputGroups.has(ps)) return ps;
      }
      return null;
    }

    function countOutputLeaves(pathStr) {
      return Object.values(outputToPath).filter(p => p.join('/').startsWith(pathStr)).length;
    }

    const NW = 160, NH = 36, HG = 28;
    const hasTensorVals = Object.keys(tensorValues).length > 0;
    const hasParams     = opNodes.some(n => n.params  && n.params.length  > 0);
    const hasWeights    = opNodes.some(n => n.weights && n.weights.length > 0);
    const maxWeightLines = opNodes.reduce((m, n) => Math.max(m, n.weights ? n.weights.length : 0), 0);
    const VG = 40
      + (hasParams   ?  14 : 0)
      + (hasWeights  ? maxWeightLines * 13 : 0)
      + (hasTensorVals ? 14 : 0);
    const producer = {}, visNodes = [], edges = [];

    // Maps pathStr → visNode id, to avoid duplicate group nodes.
    const groupNodeAdded = {};
    // Maps op-node index → the visNode id it was placed into.
    const nodeVisId = {};

    INPUTS_META.forEach((m, i) => {
      const id = 'in_' + i;
      visNodes.push({ id, label: m.name, kind: 'input', outNames: [m.name] });
      producer[m.name] = id;
    });

    // Collect metadata for expanded groups — no header nodes added to visNodes;
    // the bounding box drawn around the members is the clickable collapse target.
    const opGroupMeta     = {}; // hid → { label, pathStr, isOutput: false }
    const outputGroupMeta = {}; // hid → { label, pathStr, isOutput: true }
    const headerAdded = new Set();
    opNodes.forEach((n, i) => {
      const path = nodeToPath[i];
      if (!path) return;
      for (let depth = 1; depth <= path.length; depth++) {
        const ps = path.slice(0, depth).join('/');
        if (!expandedGroups.has(ps)) break;
        if (headerAdded.has(ps)) continue;
        headerAdded.add(ps);
        const hid = 'hdr_' + ps.replace(/[^a-zA-Z0-9]/g, '_');
        opGroupMeta[hid] = { label: ps.split('/').pop(), pathStr: ps, isOutput: false };
      }
    });
    const outputHeaderAdded = new Set();
    OUTPUTS_META.forEach((m, i) => {
      const path = outputToPath[i];
      if (!path) return;
      for (let depth = 1; depth <= path.length; depth++) {
        const ps = path.slice(0, depth).join('/');
        if (!expandedOutputGroups.has(ps)) break;
        if (outputHeaderAdded.has(ps)) continue;
        outputHeaderAdded.add(ps);
        const hid = 'ohdr_' + ps.replace(/[^a-zA-Z0-9]/g, '_');
        outputGroupMeta[hid] = { label: ps.split('/').pop(), pathStr: ps, isOutput: true };
      }
    });

    opNodes.forEach((n, i) => {
      const path = nodeToPath[i];
      const gps  = path ? visibleGroupPathStr(path) : null;

      if (gps !== null && gps !== undefined) {
        // Node is inside a (partially or fully) collapsed group.
        const safeId = 'grp_' + gps.replace(/[^a-zA-Z0-9]/g, '_');
        if (!groupNodeAdded[gps]) {
          groupNodeAdded[gps] = safeId;
          const label = gps.split('/').pop();
          const depth = gps.split('/').length;
          const cnt   = countLeaves(gps);
          const prefix = '\u25b6\ufe0e '.repeat(depth - 1); // ▶ per nesting level
          visNodes.push({ id: safeId, label, sub: `${prefix}${cnt} node${cnt===1?'':'s'} — click to expand`, kind: 'group', outNames: [], pathStr: gps });
        }
        n.outputs.forEach(o => { producer[o] = safeId; });
        const gn = visNodes.find(v => v.id === safeId);
        if (gn) n.outputs.forEach(o => { if (!gn.outNames.includes(o)) gn.outNames.push(o); });
        nodeVisId[i] = safeId;
      } else {
        const id  = 'op_' + i;
        const grpLabel = path ? path[path.length - 1] : null;
        const sub = grpLabel ? `[${grpLabel}] ${n.name}` : n.name;
        // Connect op node back to its group header if the group is expanded.
        let headerSrc = null;
        if (path) {
          for (let d = path.length; d >= 1; d--) {
            const ps = path.slice(0, d).join('/');
            if (expandedGroups.has(ps)) { headerSrc = 'hdr_' + ps.replace(/[^a-zA-Z0-9]/g, '_'); break; }
          }
        }
        visNodes.push({ id, label: n.opType || '?', sub, kind: grpLabel ? 'group-member' : 'op', outNames: n.outputs, params: n.params, weights: n.weights, headerSrc });
        n.outputs.forEach(o => { producer[o] = id; });
        nodeVisId[i] = id;
      }
    });
    // Build output visNodes — with grouping support.
    const outputGroupAdded = {};
    const outVisId = {};
    OUTPUTS_META.forEach((m, i) => {
      const path = outputToPath[i];
      const gps  = path ? visibleOutputGroupPathStr(path) : null;
      if (gps !== null && gps !== undefined) {
        const safeId = 'ogrp_' + gps.replace(/[^a-zA-Z0-9]/g, '_');
        if (!outputGroupAdded[gps]) {
          outputGroupAdded[gps] = safeId;
          const label = gps.split('/').pop();
          const depth = gps.split('/').length;
          const cnt   = countOutputLeaves(gps);
          const prefix = '\u25b6\ufe0e '.repeat(depth - 1);
          visNodes.push({ id: safeId, label, sub: `${prefix}${cnt} output${cnt===1?'':'s'} \u2014 click to expand`, kind: 'output-group', outNames: [], pathStr: gps });
        }
        outVisId[i] = safeId;
      } else {
        const id = 'out_' + i;
        const grpLabel = path ? path[path.length - 1] : null;
        let headerSrc = null;
        if (path) {
          for (let d = path.length; d >= 1; d--) {
            const ps = path.slice(0, d).join('/');
            if (expandedOutputGroups.has(ps)) { headerSrc = 'ohdr_' + ps.replace(/[^a-zA-Z0-9]/g, '_'); break; }
          }
        }
        visNodes.push({ id, label: m.name, kind: grpLabel ? 'output-group-member' : 'output', outNames: [m.name], headerSrc });
        outVisId[i] = id;
      }
    });

    const edgeSet = new Set();
    opNodes.forEach((n, i) => {
      n.inputs.forEach(inp => {
        const src = producer[inp];
        const dst = nodeVisId[i];
        if (src && dst && src !== dst) {
          const k = src + '\u2192' + dst;
          if (!edgeSet.has(k)) { edgeSet.add(k); edges.push({ from: src, to: dst }); }
        }
      });
    });
    OUTPUTS_META.forEach((m, i) => {
      const src = producer[m.name];
      const dst = outVisId[i];
      if (src && dst && src !== dst) {
        const k = src + '\u2192' + dst;
        if (!edgeSet.has(k)) { edgeSet.add(k); edges.push({ from: src, to: dst }); }
      }
    });

    // Compute topological ranks (longest path from sources)
    const rank = {}, adj = {}, inDeg = {};
    visNodes.forEach(n => { rank[n.id] = 0; adj[n.id] = []; inDeg[n.id] = 0; });
    edges.forEach(e => { adj[e.from].push(e.to); inDeg[e.to]++; });
    const bfsQ = visNodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
    while (bfsQ.length) {
      const id = bfsQ.shift();
      adj[id].forEach(to => {
        rank[to] = Math.max(rank[to], rank[id] + 1);
        if (--inDeg[to] === 0) bfsQ.push(to);
      });
    }

    // Assign x/y positions by layer
    const layers = {};
    visNodes.forEach(n => { const r = rank[n.id]; (layers[r] = layers[r] || []).push(n); });
    const byId = {}; visNodes.forEach(n => byId[n.id] = n);
    const sortedR = Object.keys(layers).map(Number).sort((a, b) => a - b);
    const maxCols = Math.max(...sortedR.map(r => layers[r].length));
    const svgW = Math.max(400, maxCols * (NW + HG) - HG + 80);
    sortedR.forEach((r, ri) => {
      const layer = layers[r];
      const lw = layer.length * (NW + HG) - HG;
      const sx = (svgW - lw) / 2;
      layer.forEach((n, i) => { n.x = sx + i * (NW + HG); n.y = ri * (NH + VG) + 20; });
    });
    const svgH = sortedR.length * (NH + VG) + 20;

    const PAL = {
      input:                 ['#d4edda', '#28a745'],
      output:                ['#d1ecf1', '#17a2b8'],
      op:                    ['#fff3cd', '#e6a817'],
      group:                 ['#e8e0f8', '#7c3aed'],   // collapsed op group — purple dashed
      'group-header':        ['#ede9fe', '#7c3aed'],   // expanded op group header
      'group-member':        ['#fdf4ff', '#c084fc'],   // expanded op group member
      'output-group':        ['#cffafe', '#0891b2'],   // collapsed output group — teal dashed
      'output-group-header': ['#e0f2fe', '#0891b2'],   // expanded output group header
      'output-group-member': ['#f0fdff', '#22d3ee'],   // expanded output group member
    };

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${svgW}" height="${svgH}" style="display:block;background:#fff">`
      + `<rect width="${svgW}" height="${svgH}" fill="#fff"/>`
      + `<defs><marker id="garr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">`
      + `<polygon points="0 0,8 3,0 6" fill="#bbb"/></marker></defs>`;

    // Draw bounding boxes around all members of each expanded group (rendered behind edges/nodes).
    // The box itself is the clickable collapse target — no separate header node needed.
    const groupMeta = { ...opGroupMeta, ...outputGroupMeta };
    const membersByHeader = {};
    visNodes.forEach(n => {
      if (n.headerSrc && n.x != null) {
        (membersByHeader[n.headerSrc] = membersByHeader[n.headerSrc] || []).push(n);
      }
    });
    const BOX_PAD = 14;
    Object.entries(membersByHeader).forEach(([hid, members]) => {
      const meta = groupMeta[hid];
      if (!meta) return;
      const xs = members.map(m => m.x);
      const ys = members.map(m => m.y);
      const bx  = Math.min(...xs) - BOX_PAD;
      const by  = Math.min(...ys) - BOX_PAD;
      const bx2 = Math.max(...xs) + NW + BOX_PAD;
      const by2 = Math.max(...ys) + NH + BOX_PAD;
      const bw  = bx2 - bx, bh = by2 - by;
      const isOut   = meta.isOutput;
      const bstroke = isOut ? '#0891b2' : '#7c3aed';
      const bfill   = isOut ? '#f0fdff' : '#faf5ff';
      const attr    = isOut ? `data-ogroup="${xmlEsc(meta.pathStr)}"` : `data-group="${xmlEsc(meta.pathStr)}"`;
      svg += `<g ${attr} style="cursor:pointer" title="Click to collapse ${xmlEsc(meta.label)}">`;
      svg += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="8" fill="${bfill}" fill-opacity="0.6" stroke="${bstroke}" stroke-width="1.5" stroke-dasharray="6,3"/>`;
      svg += `<text x="${bx + bw/2}" y="${by - 4}" text-anchor="middle" font-size="11" font-weight="600" font-family="system-ui,sans-serif" fill="${bstroke}">${xmlEsc(meta.label)} \u25b2</text>`;
      svg += `</g>`;
    });

    edges.forEach(e => {
      const f = byId[e.from], t = byId[e.to];
      if (!f || !t || f.x == null || t.x == null) return;
      const x1 = f.x + NW/2, y1 = f.y + NH, x2 = t.x + NW/2, y2 = t.y, my = (y1 + y2) / 2;
      svg += `<path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" fill="none" stroke="#ccc" stroke-width="1.5" marker-end="url(#garr)"/>`;
    });

    visNodes.forEach(n => {
      if (n.x == null) return;
      const [fill, stroke] = PAL[n.kind] || ['#eee', '#999'];
      const isGroup        = n.kind === 'group';
      const isHeader       = n.kind === 'group-header';
      const isOutputGroup  = n.kind === 'output-group';
      const isOutputHeader = n.kind === 'output-group-header';
      const isOpClickable  = isGroup  || isHeader;
      const isOutClickable = isOutputGroup || isOutputHeader;
      const clickable      = isOpClickable || isOutClickable;
      const cursor         = clickable ? 'cursor:pointer' : '';
      const grpAttr        = isOpClickable  ? ` data-group="${xmlEsc(n.pathStr)}"`
                           : isOutClickable ? ` data-ogroup="${xmlEsc(n.pathStr)}"`
                           : '';
      const dashAttr   = (isGroup || isOutputGroup) ? ' stroke-dasharray="5,3"' : '';
      const textColor  = clickable ? (isOutClickable ? '#0369a1' : '#5b21b6') : '#222';
      const subColor   = clickable ? (isOutClickable ? '#0891b2' : '#7c3aed') : '#777';
      svg += `<g${grpAttr} style="${cursor}">`;
      svg += `<rect x="${n.x}" y="${n.y}" width="${NW}" height="${NH}" rx="5" fill="${fill}" stroke="${stroke}" stroke-width="1.5"${dashAttr}/>`;
      const ty = n.sub ? n.y + NH/2 - 2 : n.y + NH/2 + 5;
      const lbl2 = n.label.length > 18 ? n.label.slice(0, 17) + '…' : n.label;
      svg += `<text x="${n.x + NW/2}" y="${ty}" text-anchor="middle" font-size="12" font-weight="600" font-family="system-ui,sans-serif" fill="${textColor}">${xmlEsc(lbl2)}</text>`;
      if (n.sub) {
        const sub2 = n.sub.length > 26 ? n.sub.slice(0, 25) + '…' : n.sub;
        svg += `<text x="${n.x + NW/2}" y="${n.y + NH - 5}" text-anchor="middle" font-size="9" font-family="system-ui,sans-serif" fill="${subColor}">${xmlEsc(sub2)}</text>`;
      }
      svg += `</g>`;
      let extraY = n.y + NH + 12;
      // Params summary line — compact stats (gray).
      if (n.params && n.params.length > 0) {
        const pFull = n.params.join('\n');
        const pDisp = pFull.length > 44 ? pFull.slice(0, 43) + '…' : pFull;
        svg += `<text data-tip="${xmlEsc(pFull)}" x="${n.x + NW/2}" y="${extraY}" text-anchor="middle" font-size="8.5" font-family="monospace,monospace" fill="#888" style="cursor:help">${xmlEsc(pDisp)}</text>`;
        extraY += 13;
      }
      // Weight value lines — tensor parameters / fitted weights (amber).
      if (n.weights && n.weights.length > 0) {
        for (const wLine of n.weights) {
          const wDisp = wLine.length > 30 ? wLine.slice(0, 29) + '…' : wLine;
          svg += `<text data-tip="${xmlEsc(wLine)}" x="${n.x + NW/2}" y="${extraY}" text-anchor="middle" font-size="8.5" font-family="monospace,monospace" fill="#b45309" style="cursor:help">${xmlEsc(wDisp)}</text>`;
          extraY += 13;
        }
      }
      // Computed tensor values — shown after inference (blue).
      if (hasTensorVals && n.outNames) {
        const summaries = n.outNames.map(o => tensorValues[o]).filter(Boolean);
        if (summaries.length) {
          const full = summaries.join('\n');
          const valStr = full.length > 44 ? full.slice(0, 43) + '…' : full;
          svg += `<text data-tip="${xmlEsc(full)}" x="${n.x + NW/2}" y="${extraY}" text-anchor="middle" font-size="8.5" font-family="monospace,monospace" fill="#005a9e" style="cursor:help">${xmlEsc(valStr)}</text>`;
        }
      }
    });
    svg += '</svg>';

    const legend = '<div style="padding:.35rem .8rem;display:flex;flex-wrap:wrap;gap:1.2rem;font-size:.78rem;color:#555;border-top:1px solid #eee;background:#fafafa;border-radius:0 0 5px 5px">'
      + '<span><span style="display:inline-block;width:10px;height:10px;background:#d4edda;border:1px solid #28a745;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Input</span>'
      + '<span><span style="display:inline-block;width:10px;height:10px;background:#fff3cd;border:1px solid #e6a817;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Op</span>'
      + '<span><span style="display:inline-block;width:10px;height:10px;background:#d1ecf1;border:1px solid #17a2b8;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Output</span>'
      + '<span><span style="display:inline-block;width:10px;height:10px;background:#e8e0f8;border:2px dashed #7c3aed;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Op Group (click)</span>'
      + '<span><span style="display:inline-block;width:10px;height:10px;background:#cffafe;border:2px dashed #0891b2;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Output Group (click)</span>'
      + '<span style="color:#6b7280;font-size:.73rem">&#9474; <span style="color:#888">●</span> params &nbsp;<span style="color:#b45309">●</span> weights &nbsp;<span style="color:#005a9e">●</span> values</span>'
      + '</div>';

    container.innerHTML = `<div style="overflow:auto;padding:.3rem">${svg}</div>${legend}`
      + (Object.keys(tensorValues).length > 0 && Object.keys(tensorValues).every(k => tensorValues[k] === (INITIAL_TENSOR_VALUES[k] || ''))
        ? '<p style="padding:.25rem .8rem;font-size:.78rem;color:#aaa;margin:0">Blue values computed with all-zero inputs. Run Inference to see your values.</p>'
        : '');

    // Floating tooltip for truncated annotation text.
    const tip = document.getElementById('svg-tip');
    container.querySelectorAll('text[data-tip]').forEach(el => {
      el.addEventListener('mousemove', e => {
        tip.textContent = el.getAttribute('data-tip');
        tip.style.display = 'block';
        tip.style.left = (e.clientX + 14) + 'px';
        tip.style.top  = (e.clientY + 14) + 'px';
      });
      el.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });

    // Click on a collapsed group node → expand it (and vice-versa).
    container.querySelectorAll('g[data-group]').forEach(el => {
      el.addEventListener('click', () => {
        const pathStr = el.getAttribute('data-group');
        if (expandedGroups.has(pathStr)) expandedGroups.delete(pathStr);
        else expandedGroups.add(pathStr);
        renderOnnxGraph();
      });
    });
    // Click on a collapsed output group node → expand it (and vice-versa).
    container.querySelectorAll('g[data-ogroup]').forEach(el => {
      el.addEventListener('click', () => {
        const pathStr = el.getAttribute('data-ogroup');
        if (expandedOutputGroups.has(pathStr)) expandedOutputGroups.delete(pathStr);
        else expandedOutputGroups.add(pathStr);
        renderOnnxGraph();
      });
    });
  } catch (err) {
    container.innerHTML = `<p style="padding:.8rem;color:#c00;margin:0">Graph render error: ${xmlEsc(err.message)}</p>`;
  }
}

document.getElementById('graph-details').addEventListener('toggle', function () {
  if (this.open) renderOnnxGraph();
});

init();
</script>
</body>
</html>
